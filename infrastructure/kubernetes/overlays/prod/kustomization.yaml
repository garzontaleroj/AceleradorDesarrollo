# Kustomize overlay — PRODUCTION
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wso2-prod

resources:
  - ../../base
  - namespace.yaml

commonLabels:
  environment: prod

patches:
  - target:
      kind: Deployment
      name: wso2-api-manager
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "4Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
  - target:
      kind: Deployment
      name: wso2-micro-integrator
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
  - target:
      kind: Deployment
      name: wso2-identity-server
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "4Gi"
  - target:
      kind: Deployment
      name: wso2-streaming-integrator
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

images:
  - name: wso2-api-manager
    newName: ghcr.io/ticxar/wso2-api-manager
    newTag: prod-latest
  - name: wso2-micro-integrator
    newName: ghcr.io/ticxar/wso2-micro-integrator
    newTag: prod-latest
  - name: wso2-identity-server
    newName: ghcr.io/ticxar/wso2-identity-server
    newTag: prod-latest
  - name: wso2-streaming-integrator
    newName: ghcr.io/ticxar/wso2-streaming-integrator
    newTag: prod-latest
