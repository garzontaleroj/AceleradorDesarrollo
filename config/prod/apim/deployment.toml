# =============================================================================
# WSO2 API Manager — deployment.toml (PROD)
# =============================================================================

[server]
hostname = "apim.wso2.ticxar.com"
offset = 0

[super_admin]
username = "admin"
password = "$secret{admin_password}"

[apim.gateway]
environment = "Production"

[apim.gateway.environment]
name = "Production"
type = "hybrid"
display_in_api_console = true
description = "Gateway Production"
service_url = "https://apim.wso2.ticxar.com:9443/services/"
ws_endpoint = "ws://apim.wso2.ticxar.com:9099"
wss_endpoint = "wss://apim.wso2.ticxar.com:8099"
http_endpoint = "http://apim.wso2.ticxar.com:8280"
https_endpoint = "https://apim.wso2.ticxar.com:8243"

[apim.cors]
enable = true
allow_origins = ["https://portal.wso2.ticxar.com"]
allow_methods = ["GET","PUT","POST","DELETE","PATCH","OPTIONS"]
allow_headers = ["authorization","Access-Control-Allow-Origin","Content-Type","SOAPAction","apikey"]
allow_credentials = true

[apim.analytics]
enable = true

[apim.throttling]
enable_data_publishing = true
enable_policy_deploy = true

[apim.key_manager]
service_url = "https://is.wso2.ticxar.com:9443/services/"

[logging]
level = "ERROR"

[[datasource]]
id = "WSO2AM_DB"
url = "jdbc:postgresql://postgres-prod.internal:5432/wso2amdb"
username = "$secret{db_username}"
password = "$secret{db_password}"
driver = "org.postgresql.Driver"
pool_options.maxActive = 150
pool_options.validationInterval = 30000
pool_options.testOnBorrow = true
pool_options.validationQuery = "SELECT 1"

[[datasource]]
id = "WSO2_SHARED_DB"
url = "jdbc:postgresql://postgres-prod.internal:5432/wso2shareddb"
username = "$secret{db_username}"
password = "$secret{db_password}"
driver = "org.postgresql.Driver"
pool_options.maxActive = 150
pool_options.testOnBorrow = true
