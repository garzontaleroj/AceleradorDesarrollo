# =============================================================================
# WSO2 Identity Server — deployment.toml (PROD)
# =============================================================================

[server]
hostname = "is.wso2.ticxar.com"
offset = 0

[super_admin]
username = "admin"
password = "$secret{admin_password}"

[authentication.authenticator.totp]
enable = true

[authentication.authenticator.email_otp]
enable = true

[oauth]
token_cleanup.enable = true
token_cleanup.retain_access_tokens_for_auditing = true

[oauth.endpoints]
oauth2_authz_url = "https://is.wso2.ticxar.com:9443/oauth2/authorize"
oauth2_token_url = "https://is.wso2.ticxar.com:9443/oauth2/token"
oauth2_revoke_url = "https://is.wso2.ticxar.com:9443/oauth2/revoke"
oauth2_introspect_url = "https://is.wso2.ticxar.com:9443/oauth2/introspect"
oauth2_userinfo_url = "https://is.wso2.ticxar.com:9443/oauth2/userinfo"

[cors]
allow_generic_http_requests = true
allow_any_origin = false
allowed_origins = ["https://portal.wso2.ticxar.com"]

[session_data]
cleanup.enable = true
cleanup.clean_expired_session_data_in_minutes = 60
cleanup.clean_expired_session_data_every_in_minutes = 30

[logging]
level = "ERROR"

[[datasource]]
id = "WSO2IdentityDB"
url = "jdbc:postgresql://postgres-prod.internal:5432/wso2identitydb"
username = "$secret{db_username}"
password = "$secret{db_password}"
driver = "org.postgresql.Driver"
pool_options.maxActive = 150
pool_options.validationInterval = 30000
pool_options.testOnBorrow = true
pool_options.validationQuery = "SELECT 1"

[[datasource]]
id = "WSO2_SHARED_DB"
url = "jdbc:postgresql://postgres-prod.internal:5432/wso2shareddb"
username = "$secret{db_username}"
password = "$secret{db_password}"
driver = "org.postgresql.Driver"
pool_options.maxActive = 150
pool_options.testOnBorrow = true
