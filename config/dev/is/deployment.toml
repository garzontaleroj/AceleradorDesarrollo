# =============================================================================
# WSO2 Identity Server — deployment.toml (DEV)
# =============================================================================

[server]
hostname = "is.dev.wso2.ticxar.com"
offset = 0

[super_admin]
username = "admin"
password = "$secret{admin_password}"

[authentication.authenticator.totp]
enable = true

[authentication.authenticator.email_otp]
enable = true

[oauth]
token_cleanup.enable = true
token_cleanup.retain_access_tokens_for_auditing = true

[oauth.endpoints]
oauth2_authz_url = "https://is.dev.wso2.ticxar.com:9443/oauth2/authorize"
oauth2_token_url = "https://is.dev.wso2.ticxar.com:9443/oauth2/token"
oauth2_revoke_url = "https://is.dev.wso2.ticxar.com:9443/oauth2/revoke"
oauth2_introspect_url = "https://is.dev.wso2.ticxar.com:9443/oauth2/introspect"
oauth2_userinfo_url = "https://is.dev.wso2.ticxar.com:9443/oauth2/userinfo"

[cors]
allow_generic_http_requests = true
allow_any_origin = true

[logging]
level = "DEBUG"

[[datasource]]
id = "WSO2IdentityDB"
url = "jdbc:h2:./repository/database/WSO2IDENTITY_DB;DB_CLOSE_ON_EXIT=FALSE"
username = "wso2carbon"
password = "wso2carbon"
driver = "org.h2.Driver"

[[datasource]]
id = "WSO2_SHARED_DB"
url = "jdbc:h2:./repository/database/WSO2SHARED_DB;DB_CLOSE_ON_EXIT=FALSE"
username = "wso2carbon"
password = "wso2carbon"
driver = "org.h2.Driver"
