# =============================================================================
# WSO2 API Manager — deployment.toml (DEV)
# =============================================================================

[server]
hostname = "apim.dev.wso2.ticxar.com"
offset = 0

[super_admin]
username = "admin"
password = "$secret{admin_password}"

[apim.gateway]
environment = "Development"

[apim.gateway.environment]
name = "Development"
type = "hybrid"
display_in_api_console = true
description = "Gateway DEV"
service_url = "https://apim.dev.wso2.ticxar.com:9443/services/"
ws_endpoint = "ws://apim.dev.wso2.ticxar.com:9099"
wss_endpoint = "wss://apim.dev.wso2.ticxar.com:8099"
http_endpoint = "http://apim.dev.wso2.ticxar.com:8280"
https_endpoint = "https://apim.dev.wso2.ticxar.com:8243"

[apim.cors]
enable = true
allow_origins = "*"
allow_methods = ["GET","PUT","POST","DELETE","PATCH","OPTIONS"]
allow_headers = ["authorization","Access-Control-Allow-Origin","Content-Type","SOAPAction","apikey"]
allow_credentials = false

[apim.analytics]
enable = false

[logging]
level = "DEBUG"

[[datasource]]
id = "WSO2AM_DB"
url = "jdbc:h2:./repository/database/WSO2AM_DB;DB_CLOSE_ON_EXIT=FALSE"
username = "wso2carbon"
password = "wso2carbon"
driver = "org.h2.Driver"

[[datasource]]
id = "WSO2_SHARED_DB"
url = "jdbc:h2:./repository/database/WSO2SHARED_DB;DB_CLOSE_ON_EXIT=FALSE"
username = "wso2carbon"
password = "wso2carbon"
driver = "org.h2.Driver"
