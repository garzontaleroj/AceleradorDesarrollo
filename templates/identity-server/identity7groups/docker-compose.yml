version: '3.7'
services:
  wso2is:
    image: wso2/wso2is:7.2.0
    container_name: wso2is
    ports:
      - "9443:9443"
      - "9763:9763"
    volumes:
      - ./deployment.toml:/home/wso2carbon/wso2is-7.2.0/repository/conf/deployment.toml
      - ./userstores/LDAPSecondary.xml:/home/wso2carbon/wso2is-7.2.0/repository/deployment/server/userstores/LDAPSecondary.xml
      - wso2is_db:/home/wso2carbon/wso2is-7.2.0/repository/database
    environment:
      - TZ=America/Bogota
    depends_on:
      - openldap

  openldap:
    image: osixia/openldap:latest
    container_name: openldap
    command: --copy-service
    environment:
      - LDAP_ORGANISATION=TestOrg
      - LDAP_DOMAIN=tsf.axacolpatria.co
      - LDAP_ADMIN_PASSWORD=admin
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ./ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d

  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: phpldapadmin
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=openldap
      - PHPLDAPADMIN_HTTPS=false
    ports:
      - "8080:80"
    depends_on:
      - openldap

volumes:
  openldap_data:
  openldap_config:
  wso2is_db:
