# ============================================================
# OpenShift Template — Quickstart Application
# ============================================================
# Despliega una aplicación completa en OCP con:
#   - BuildConfig (Docker strategy desde Git)
#   - ImageStream
#   - Deployment (con health checks y recursos)
#   - Service (ClusterIP)
#   - Route (TLS edge termination)
#
# Uso:
#   oc process -f openshift-template.yaml \
#     -p APP_NAME=mi-app \
#     -p SOURCE_REPOSITORY_URL=https://github.com/org/repo.git \
#     | oc apply -f -
# ============================================================
apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: "${APP_NAME}"
  annotations:
    openshift.io/display-name: "OCP Quickstart Application"
    description: >-
      Template para desplegar una aplicación con BuildConfig, ImageStream,
      Deployment, Service y Route en OpenShift Container Platform.
    tags: "quickstart,java,docker"
    iconClass: "icon-openjdk"

parameters:
  - name: APP_NAME
    displayName: Application Name
    description: Nombre de la aplicación. Se usa como prefijo para todos los objetos.
    required: true
    value: ocp-quickstart

  - name: NAMESPACE
    displayName: Namespace
    description: Proyecto de OpenShift donde desplegar.
    required: true
    value: ocp-quickstart-dev

  - name: SOURCE_REPOSITORY_URL
    displayName: Git Repository URL
    description: URL del repositorio Git con el código fuente y Dockerfile.
    required: true

  - name: SOURCE_REPOSITORY_REF
    displayName: Git Reference
    description: Rama, tag o commit del repositorio.
    value: main

  - name: SOURCE_CONTEXT_DIR
    displayName: Context Directory
    description: Subdirectorio dentro del repositorio donde está el Dockerfile.
    value: "."

  - name: APP_PORT
    displayName: Application Port
    description: Puerto HTTP expuesto por la aplicación.
    value: "8080"

  - name: REPLICAS
    displayName: Replicas
    description: Número de réplicas del Deployment.
    value: "1"

  - name: CPU_REQUEST
    displayName: CPU Request
    value: "100m"

  - name: CPU_LIMIT
    displayName: CPU Limit
    value: "500m"

  - name: MEMORY_REQUEST
    displayName: Memory Request
    value: "256Mi"

  - name: MEMORY_LIMIT
    displayName: Memory Limit
    value: "512Mi"

  - name: WEBHOOK_SECRET
    displayName: Webhook Secret
    description: Token secreto para webhooks de Git.
    generate: expression
    from: "[a-zA-Z0-9]{40}"

objects:

  # ----- ImageStream -----
  - apiVersion: image.openshift.io/v1
    kind: ImageStream
    metadata:
      name: "${APP_NAME}"
      namespace: "${NAMESPACE}"
      labels:
        app: "${APP_NAME}"
        app.kubernetes.io/name: "${APP_NAME}"
        app.kubernetes.io/part-of: "${APP_NAME}"
    spec:
      lookupPolicy:
        local: true

  # ----- BuildConfig -----
  - apiVersion: build.openshift.io/v1
    kind: BuildConfig
    metadata:
      name: "${APP_NAME}"
      namespace: "${NAMESPACE}"
      labels:
        app: "${APP_NAME}"
        app.kubernetes.io/name: "${APP_NAME}"
    spec:
      runPolicy: Serial
      source:
        type: Git
        git:
          uri: "${SOURCE_REPOSITORY_URL}"
          ref: "${SOURCE_REPOSITORY_REF}"
        contextDir: "${SOURCE_CONTEXT_DIR}"
      strategy:
        type: Docker
        dockerStrategy:
          dockerfilePath: Dockerfile
      output:
        to:
          kind: ImageStreamTag
          name: "${APP_NAME}:latest"
      resources:
        limits:
          cpu: "1"
          memory: 1Gi
        requests:
          cpu: 250m
          memory: 512Mi
      triggers:
        - type: GitHub
          github:
            secret: "${WEBHOOK_SECRET}"
        - type: Generic
          generic:
            secret: "${WEBHOOK_SECRET}"
            allowEnv: true
        - type: ConfigChange
        - type: ImageChange

  # ----- Deployment -----
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "${APP_NAME}"
      namespace: "${NAMESPACE}"
      labels:
        app: "${APP_NAME}"
        app.kubernetes.io/name: "${APP_NAME}"
        app.kubernetes.io/part-of: "${APP_NAME}"
      annotations:
        image.openshift.io/triggers: >-
          [{"from":{"kind":"ImageStreamTag","name":"${APP_NAME}:latest"},"fieldPath":"spec.template.spec.containers[0].image"}]
    spec:
      replicas: "${{REPLICAS}}"
      selector:
        matchLabels:
          app: "${APP_NAME}"
      template:
        metadata:
          labels:
            app: "${APP_NAME}"
            app.kubernetes.io/name: "${APP_NAME}"
        spec:
          containers:
            - name: "${APP_NAME}"
              image: "${APP_NAME}:latest"
              ports:
                - containerPort: "${{APP_PORT}}"
                  protocol: TCP
              env:
                - name: APP_NAME
                  value: "${APP_NAME}"
              resources:
                requests:
                  cpu: "${CPU_REQUEST}"
                  memory: "${MEMORY_REQUEST}"
                limits:
                  cpu: "${CPU_LIMIT}"
                  memory: "${MEMORY_LIMIT}"
              livenessProbe:
                httpGet:
                  path: /health/live
                  port: "${{APP_PORT}}"
                initialDelaySeconds: 30
                periodSeconds: 10
                timeoutSeconds: 3
                failureThreshold: 3
              readinessProbe:
                httpGet:
                  path: /health/ready
                  port: "${{APP_PORT}}"
                initialDelaySeconds: 10
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 3
              startupProbe:
                httpGet:
                  path: /health/live
                  port: "${{APP_PORT}}"
                initialDelaySeconds: 5
                periodSeconds: 5
                failureThreshold: 12
          restartPolicy: Always
          terminationGracePeriodSeconds: 30

  # ----- Service -----
  - apiVersion: v1
    kind: Service
    metadata:
      name: "${APP_NAME}"
      namespace: "${NAMESPACE}"
      labels:
        app: "${APP_NAME}"
        app.kubernetes.io/name: "${APP_NAME}"
    spec:
      type: ClusterIP
      selector:
        app: "${APP_NAME}"
      ports:
        - name: http
          port: "${{APP_PORT}}"
          targetPort: "${{APP_PORT}}"
          protocol: TCP

  # ----- Route -----
  - apiVersion: route.openshift.io/v1
    kind: Route
    metadata:
      name: "${APP_NAME}"
      namespace: "${NAMESPACE}"
      labels:
        app: "${APP_NAME}"
        app.kubernetes.io/name: "${APP_NAME}"
    spec:
      to:
        kind: Service
        name: "${APP_NAME}"
        weight: 100
      port:
        targetPort: http
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
      wildcardPolicy: None
