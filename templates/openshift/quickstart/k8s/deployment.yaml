apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocp-quickstart
  labels:
    app: ocp-quickstart
    app.kubernetes.io/name: ocp-quickstart
    app.kubernetes.io/part-of: ocp-quickstart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocp-quickstart
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ocp-quickstart
        app.kubernetes.io/name: ocp-quickstart
    spec:
      containers:
        - name: ocp-quickstart
          image: image-registry.openshift-image-registry.svc:5000/ocp-quickstart-dev/ocp-quickstart:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: APP_NAME
              value: ocp-quickstart
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
