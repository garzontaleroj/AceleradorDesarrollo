# =============================================================================
# Catálogo de Plantillas WSO2 — TICXAR AceleradorDesarrollo
# =============================================================================
# Este archivo es el índice central de todas las plantillas disponibles.
# Los desarrolladores pueden consultar este catálogo para encontrar plantillas
# reutilizables para sus proyectos de integración.
# =============================================================================

version: "1.0"
last_updated: "2025-07-17"

templates:

  # =========================================================================
  # MICRO INTEGRATOR
  # =========================================================================

  - id: mi-rest-crud
    name: "API REST CRUD"
    product: micro-integrator
    category: rest-api
    path: micro-integrator/rest-api/crud-api
    description: >
      API REST completa con operaciones CRUD (GET, POST, PUT, DELETE).
      Incluye manejo de errores, logging y endpoint configurable.
    difficulty: basico
    tags: [rest, crud, api, beginner]
    prerequisites: []
    estimated_time: "15 min"

  - id: mi-proxy-passthrough
    name: "Proxy Pass-Through"
    product: micro-integrator
    category: rest-api
    path: micro-integrator/rest-api/proxy-passthrough
    description: >
      Proxy transparente que reenvía peticiones a un backend sin transformación.
      Útil como punto de entrada centralizado con logging.
    difficulty: basico
    tags: [proxy, passthrough, routing]
    prerequisites: []
    estimated_time: "10 min"

  - id: mi-api-auth
    name: "API con Autenticación OAuth2"
    product: micro-integrator
    category: rest-api
    path: micro-integrator/rest-api/api-with-auth
    description: >
      API REST protegida con OAuth2 Bearer Token validation contra IS.
    difficulty: intermedio
    tags: [rest, oauth2, security, token]
    prerequisites: [is-spa-oauth2]
    estimated_time: "30 min"

  - id: mi-content-router
    name: "Content-Based Router"
    product: micro-integrator
    category: message-patterns
    path: micro-integrator/message-patterns/content-based-router
    description: >
      Enruta mensajes a diferentes endpoints según el contenido del payload.
      Implementa el patrón EIP Content-Based Router.
    difficulty: intermedio
    tags: [eip, routing, patterns, switch]
    prerequisites: []
    estimated_time: "20 min"

  - id: mi-store-forward
    name: "Store and Forward"
    product: micro-integrator
    category: message-patterns
    path: micro-integrator/message-patterns/store-and-forward
    description: >
      Patrón de mensajería garantizada con Message Store y Message Processor.
      Asegura entrega incluso si el backend está temporalmente no disponible.
    difficulty: avanzado
    tags: [eip, reliability, queue, guaranteed-delivery]
    prerequisites: []
    estimated_time: "45 min"

  - id: mi-retry-backoff
    name: "Retry con Exponential Backoff"
    product: micro-integrator
    category: error-handling
    path: micro-integrator/error-handling/retry-with-backoff
    description: >
      Patrón de reintentos con backoff exponencial para llamadas a backends inestables.
    difficulty: intermedio
    tags: [error-handling, retry, resilience]
    prerequisites: []
    estimated_time: "20 min"

  # =========================================================================
  # API MANAGER
  # =========================================================================

  - id: apim-rest-crud
    name: "Definición API CRUD OpenAPI 3.0"
    product: api-manager
    category: api-definitions
    path: api-manager/api-definitions/rest-crud
    description: >
      Definición OpenAPI 3.0 completa para API CRUD estándar con schemas,
      respuestas de error y documentación inline.
    difficulty: basico
    tags: [openapi, swagger, crud, definition]
    prerequisites: []
    estimated_time: "15 min"

  - id: apim-rate-limiting
    name: "Política de Rate Limiting"
    product: api-manager
    category: policies
    path: api-manager/policies/rate-limiting
    description: >
      Política de limitación de tasa personalizada con diferentes niveles
      (bronze, silver, gold, unlimited).
    difficulty: intermedio
    tags: [policy, throttling, rate-limit, security]
    prerequisites: []
    estimated_time: "15 min"

  # =========================================================================
  # IDENTITY SERVER
  # =========================================================================

  - id: is-spa-oauth2
    name: "SPA con OAuth2/OIDC"
    product: identity-server
    category: service-providers
    path: identity-server/service-providers/spa-oauth2
    description: >
      Configuración de Service Provider para Single Page Application
      con OAuth2 Authorization Code + PKCE.
    difficulty: intermedio
    tags: [oauth2, oidc, spa, pkce, authentication]
    prerequisites: []
    estimated_time: "25 min"

  - id: is-azure-ad
    name: "Federación con Azure AD"
    product: identity-server
    category: identity-providers
    path: identity-server/identity-providers/azure-ad
    description: >
      Configuración de Identity Provider federado con Microsoft Azure AD
      usando OIDC.
    difficulty: avanzado
    tags: [federation, azure-ad, oidc, enterprise]
    prerequisites: []
    estimated_time: "40 min"

  - id: is-ip-based-2fa
    name: "2FA basado en IP"
    product: identity-server
    category: adaptive-auth
    path: identity-server/adaptive-auth/ip-based-2fa
    description: >
      Script de autenticación adaptativa que solicita segundo factor
      cuando el login viene de una IP no reconocida.
    difficulty: intermedio
    tags: [2fa, adaptive-auth, security, conditional]
    prerequisites: []
    estimated_time: "20 min"

  - id: is-identity7groups
    name: "Integración SCIM2 con Grupos LDAP/AD"
    product: identity-server
    category: identity7groups
    path: identity-server/identity7groups
    description: >
      Integración completa de WSO2 IS 7.2.0 con directorios LDAP/Active Directory
      externos para gestión de usuarios y grupos vía SCIM2. Incluye dos escenarios
      Docker Compose (OpenLDAP y Samba AD DC simulando dominio AXA Colpatria TSTF),
      configuración de userstores ReadOnly, mapeo de claims, y workaround para el
      problema conocido de SCIM2 Groups con userstores externos (seed de metadatos
      en H2 IDN_SCIM_GROUP). Scripts automatizados para claims y grupos.
    difficulty: avanzado
    tags: [scim2, ldap, active-directory, groups, userstore, claims, docker, samba-ad]
    prerequisites: []
    estimated_time: "60 min"

  # =========================================================================
  # STREAMING INTEGRATOR
  # =========================================================================

  - id: si-kafka-consumer
    name: "Consumidor Kafka"
    product: streaming-integrator
    category: event-processing
    path: streaming-integrator/event-processing/kafka-consumer
    description: >
      Aplicación Siddhi que consume eventos de un topic Kafka,
      los transforma y los envía a un destino.
    difficulty: intermedio
    tags: [kafka, streaming, events, siddhi]
    prerequisites: []
    estimated_time: "30 min"

  # =========================================================================
  # BALLERINA
  # =========================================================================

  - id: bal-http-service
    name: "Servicio HTTP Ballerina"
    product: ballerina
    category: http-service
    path: ballerina/http-service
    description: >
      Servicio HTTP con Ballerina con endpoints REST, health check
      y manejo de errores.
    difficulty: basico
    tags: [ballerina, http, rest, service]
    prerequisites: []
    estimated_time: "15 min"

  # =========================================================================
  # OBSERVABILIDAD — API MANAGER
  # =========================================================================

  - id: apim-otel-jaeger
    name: "OpenTelemetry + Jaeger para API Manager"
    product: api-manager
    category: observability
    path: api-manager/observability/opentelemetry-jaeger
    description: >
      Configuración de trazabilidad distribuida para WSO2 API Manager 4.3.0
      usando OpenTelemetry como estándar de instrumentación y Jaeger como
      backend de trazas. Incluye deployment.toml y docker-compose.
    difficulty: intermedio
    tags: [apim, opentelemetry, jaeger, observabilidad, trazas, docker]
    prerequisites: [docker, docker-compose]
    estimated_time: "20 min"

  # =========================================================================
  # OBSERVABILIDAD — MICRO INTEGRATOR
  # =========================================================================

  - id: mi-otel-jaeger
    name: "OpenTelemetry + Jaeger para Micro Integrator"
    product: micro-integrator
    category: observability
    path: micro-integrator/observability/opentelemetry-jaeger
    description: >
      Configuración de trazabilidad distribuida para WSO2 Micro Integrator
      4.3.0 usando OpenTelemetry y Jaeger. Captura spans de mediación
      (secuencias, mediadores, endpoints) con estadísticas habilitadas.
    difficulty: intermedio
    tags: [mi, opentelemetry, jaeger, observabilidad, trazas, mediacion, docker]
    prerequisites: [docker, docker-compose]
    estimated_time: "20 min"

  # =========================================================================
  # OPENCHOREO
  # =========================================================================

  - id: openchoreo-getting-started
    name: "Getting Started con OpenChoreo"
    product: openchoreo
    category: platform-setup
    path: openchoreo/getting-started
    description: >
      Plantilla base para desplegar componentes WSO2 y servicios Ballerina
      en OpenChoreo, la plataforma de desarrollo open-source para Kubernetes
      (CNCF Sandbox). Incluye manifiestos de componente y endpoints.
    difficulty: avanzado
    tags: [openchoreo, kubernetes, platform, cncf, backstage, devops]
    prerequisites: [kubernetes, kubectl, helm]
    estimated_time: "45 min"

  # =========================================================================
  # KARATE — TESTING
  # =========================================================================

  - id: karate-api-testing
    name: "Testing de APIs con Karate"
    product: karate
    category: api-testing
    path: karate/api-testing
    description: >
      Proyecto de pruebas automatizadas con Karate framework para validar
      APIs publicadas en WSO2 API Manager y servicios del Micro Integrator.
      Incluye tests de salud, CRUD y configuración por entorno.
    difficulty: intermedio
    tags: [karate, testing, api, rest, automatizacion, qa]
    prerequisites: [java-11, maven]
    estimated_time: "30 min"

  # =========================================================================
  # QUARKUS — REST API
  # =========================================================================

  - id: quarkus-rest-api
    name: "API REST con Quarkus"
    product: quarkus
    category: rest-api
    path: quarkus/rest-api
    description: >
      Proyecto base de API REST con Quarkus (Supersonic Subatomic Java).
      Incluye RESTEasy Reactive, CDI, OpenAPI/Swagger UI, Health checks,
      Micrometer Prometheus y soporte para compilación nativa con GraalVM.
    difficulty: intermedio
    tags: [quarkus, java, rest, openapi, cloud-native, graalvm]
    prerequisites: [java-17, maven]
    estimated_time: "20 min"

  # =========================================================================
  # SPRING BOOT — REST API
  # =========================================================================

  - id: springboot-rest-api
    name: "API REST con Spring Boot"
    product: spring-boot
    category: rest-api
    path: spring-boot/rest-api
    description: >
      Proyecto base de API REST con Spring Boot 3.x. Incluye Spring Web MVC,
      Actuator (health/metrics/info), OpenAPI/Swagger UI con springdoc,
      Bean Validation y configuración por perfiles YAML.
    difficulty: basico
    tags: [spring-boot, java, rest, openapi, actuator, web]
    prerequisites: [java-17, maven]
    estimated_time: "15 min"

  # =========================================================================
  # PYTHON — FASTAPI REST
  # =========================================================================

  - id: python-fastapi-rest
    name: "API REST con Python FastAPI"
    product: python
    category: fastapi-rest
    path: python/fastapi-rest
    description: >
      Proyecto base de API REST con FastAPI y Python. Incluye validación
      con Pydantic, documentación OpenAPI automática (Swagger UI + ReDoc),
      health check y tests con pytest + httpx.
    difficulty: basico
    tags: [python, fastapi, rest, openapi, pydantic, async]
    prerequisites: [python-3.10]
    estimated_time: "15 min"
