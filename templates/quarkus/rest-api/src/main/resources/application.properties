# =============================================================================
# Quarkus REST API — Configuración
# =============================================================================

# Servidor
quarkus.http.port=8080

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.info-title=TICXAR Quarkus REST API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API REST de ejemplo con Quarkus para el Acelerador TICXAR
quarkus.swagger-ui.always-include=true

# Health Checks
quarkus.health.extensions.enabled=true

# Logging
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO

# CORS (desarrollo)
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:4200

# Perfil dev
%dev.quarkus.log.level=DEBUG
%dev.quarkus.http.port=8080

# Perfil test
%test.quarkus.log.level=DEBUG
