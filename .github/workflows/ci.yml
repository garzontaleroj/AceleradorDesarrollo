# =============================================================================
# CI Pipeline — Se ejecuta en cada Pull Request hacia main
# Valida, construye y escanea todos los artefactos WSO2
# =============================================================================
name: CI — Build & Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  BALLERINA_VERSION: "2201.9.0"
  MI_VERSION: "4.3.0"

jobs:
  # ---------------------------------------------------------------------------
  # Detectar qué proyectos cambiaron para ejecutar solo lo necesario
  # ---------------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      apim: ${{ steps.filter.outputs.apim }}
      mi: ${{ steps.filter.outputs.mi }}
      is: ${{ steps.filter.outputs.is }}
      si: ${{ steps.filter.outputs.si }}
      ballerina: ${{ steps.filter.outputs.ballerina }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            apim:
              - 'projects/api-manager/**'
              - 'config/**/apim/**'
            mi:
              - 'projects/micro-integrator/**'
              - 'config/**/mi/**'
            is:
              - 'projects/identity-server/**'
              - 'config/**/is/**'
            si:
              - 'projects/streaming-integrator/**'
              - 'config/**/si/**'
            ballerina:
              - 'projects/ballerina/**'
            infra:
              - 'infrastructure/**'
              - 'kubernetes/**'

  # ---------------------------------------------------------------------------
  # Validar artefactos XML de Synapse (MI)
  # ---------------------------------------------------------------------------
  validate-mi:
    name: Validate Micro Integrator
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mi == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Validate Synapse XML
        run: |
          echo "🔍 Validating Synapse XML artifacts..."
          find projects/micro-integrator/src -name "*.xml" -exec xmllint --noout {} \;

      - name: Build MI artifacts
        working-directory: projects/micro-integrator
        run: |
          if [ -f pom.xml ]; then
            mvn clean package -DskipTests -B
          else
            echo "⚠️ No pom.xml found — skipping Maven build"
          fi

      - name: Validate deployment.toml
        run: |
          echo "🔍 Validating deployment.toml syntax..."
          python3 -c "
          import tomllib, sys, pathlib
          for f in pathlib.Path('config').rglob('**/mi/deployment.toml'):
              try:
                  tomllib.loads(f.read_text())
                  print(f'✅ {f}')
              except Exception as e:
                  print(f'❌ {f}: {e}')
                  sys.exit(1)
          "

  # ---------------------------------------------------------------------------
  # Validar API Manager artifacts
  # ---------------------------------------------------------------------------
  validate-apim:
    name: Validate API Manager
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.apim == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Validate API definitions (OpenAPI)
        run: |
          npm install -g @stoplight/spectral-cli
          find projects/api-manager/apis -name "*.yaml" -o -name "*.json" | while read f; do
            echo "🔍 Validating $f"
            spectral lint "$f" --ruleset projects/api-manager/.spectral.yaml || true
          done

      - name: Validate API policies
        run: |
          echo "🔍 Checking API policies structure..."
          find projects/api-manager/policies -name "*.xml" -exec xmllint --noout {} \; 2>/dev/null || true

  # ---------------------------------------------------------------------------
  # Validar Identity Server configs
  # ---------------------------------------------------------------------------
  validate-is:
    name: Validate Identity Server
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.is == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Validate IS configurations
        run: |
          echo "🔍 Validating Identity Server configs..."
          find projects/identity-server -name "*.xml" -exec xmllint --noout {} \; 2>/dev/null || true
          find projects/identity-server -name "*.toml" -exec python3 -c "
          import tomllib, sys
          with open(sys.argv[1], 'rb') as f:
              tomllib.load(f)
          print(f'✅ {sys.argv[1]}')
          " {} \;

  # ---------------------------------------------------------------------------
  # Validar Streaming Integrator (Siddhi Apps)
  # ---------------------------------------------------------------------------
  validate-si:
    name: Validate Streaming Integrator
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.si == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Validate Siddhi Apps syntax
        run: |
          echo "🔍 Validating Siddhi applications..."
          for f in projects/streaming-integrator/siddhi-apps/*.siddhi; do
            if [ -f "$f" ]; then
              echo "📄 Checking: $f"
              # Verificación básica de estructura Siddhi
              grep -q "@App:name" "$f" && echo "  ✅ App name found" || echo "  ⚠️ Missing @App:name"
            fi
          done

  # ---------------------------------------------------------------------------
  # Build Ballerina modules
  # ---------------------------------------------------------------------------
  build-ballerina:
    name: Build Ballerina
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ballerina == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ballerina
        uses: ballerina-platform/setup-ballerina@v1
        with:
          version: ${{ env.BALLERINA_VERSION }}

      - name: Build Ballerina project
        working-directory: projects/ballerina
        run: bal build

      - name: Run Ballerina tests
        working-directory: projects/ballerina
        run: bal test

  # ---------------------------------------------------------------------------
  # Validar infraestructura (Docker + K8s)
  # ---------------------------------------------------------------------------
  validate-infra:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3008,DL3009

      - name: Validate Kubernetes manifests
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          chmod +x kubeconform
          find infrastructure/kubernetes -name "*.yaml" | xargs ./kubeconform -strict -summary

      - name: Kustomize build check
        run: |
          for env in dev qa staging prod; do
            echo "🔍 Validating overlay: $env"
            kubectl kustomize infrastructure/kubernetes/overlays/$env > /dev/null
          done

  # ---------------------------------------------------------------------------
  # Security scan
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
